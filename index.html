<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarmoFast Pro - Gestão de Alta Performance para Marmorarias</title>
    <meta name="theme-color" content="#0D4C4F">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-text {
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.7) 50%, transparent 70%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            display: inline-block;
        }
        .group:hover .shimmer-text {
            animation: shimmer 2.5s infinite linear;
        }
        
        .marble-vein {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.05) 48%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 52%, transparent 55%);
            pointer-events: none;
        }

        @media (max-width: 480px) {
          .container { padding-left: 0.25rem; padding-right: 0.25rem; }
          h2 { font-size: 2rem !important; }
          .grid { gap: 0.75rem !important; }
          input, select, button { font-size: 13px !important; }
          .p-8 { padding: 1.25rem !important; }
          .rounded-\[4rem\] { border-radius: 1.5rem !important; }
          .rounded-\[3rem\] { border-radius: 1.25rem !important; }
          .tabela-custos { font-size: 10px; }
          .tabela-custos td, .tabela-custos th { padding: 4px 2px; }
          .coluna-ocultar-mobile { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
